version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    container_name: enso-test-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test"]
      interval: 2s
      timeout: 3s
      retries: 10
